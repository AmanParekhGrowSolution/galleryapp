name: 🔄 Sync open PRs with main

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    name: Update open PRs to latest main
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── Checkout initialises gh CLI auth with AGENT_PAT ────────────────────
      # All Claude workflows that call gh write APIs require this step.
      # Without it, GH_TOKEN=AGENT_PAT gives HTTP 401 on the runner.
      - name: Checkout (auth setup)
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.AGENT_PAT }}
          sparse-checkout: .github
          sparse-checkout-cone-mode: false

      # ── Update every open PR that targets main ─────────────────────────────
      # gh pr update-branch merges main into the PR branch via the GitHub API.
      # We use AGENT_PAT (not GITHUB_TOKEN) so the resulting push re-triggers
      # android-ci.yml and claude-review.yml on the updated PR branch.
      # GITHUB_TOKEN pushes suppress pull_request:synchronize — AGENT_PAT does not.
      - name: Update all open PRs (label conflicts for Claude)
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail

          # Use REST (gh api), not GraphQL (gh pr list --json) — fine-grained
          # PATs do not have GraphQL access but do have REST access.
          PRS=$(gh api "repos/$REPO/pulls?state=open&base=main&per_page=100" \
                  --jq '.[] | "\(.number) \(.head.ref)"')

          if [ -z "$PRS" ]; then
            echo "No open PRs targeting main — nothing to sync."
            exit 0
          fi

          while IFS=' ' read -r num branch; do
            echo "::group::PR #$num ($branch)"
            if gh pr update-branch "$num" --repo "$REPO" 2>/tmp/out.txt; then
              echo "✓ PR #$num is now up-to-date with main"
            else
              cat /tmp/out.txt
              if grep -qiE "merge conflict|cannot be merged|not mergeable|conflict" /tmp/out.txt; then
                echo "✗ PR #$num has merge conflicts — labeling for Claude"
                # REST label mutation — same pattern as claude-autofix.yml
                gh api -X POST "repos/$REPO/issues/$num/labels" \
                  -f "labels[]=claude: resolve-conflict" || true
              else
                echo "⚠ PR #$num update-branch failed for unknown reason — leaving PR alone"
              fi
            fi
            echo "::endgroup::"
          done <<< "$PRS"
