name: 🤖 Claude Code Agent

on:
  issues:
    types: [labeled]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLAUDE_CODE_DEBUG_LOG_LEVEL: verbose

jobs:
  claude-agent:
    name: "🤖 Claude — ${{ github.event.label.name }}"
    if: |
      github.event.label.name == 'claude: fix' ||
      github.event.label.name == 'claude: implement'

    concurrency:
      group: claude-agent-issue-${{ github.event.issue.number }}
      cancel-in-progress: true

    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. JDK (so Claude can run ./gradlew to verify its own code) ───────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Grant Gradle permission
        run: chmod +x gradlew

      # ── 3. Signal start on issue ──────────────────────────────────────────
      - name: Post "agent activated" comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: [
                '## 🤖 Claude Code Agent Activated',
                '',
                `Analysing **Issue #${{ github.event.issue.number }}** — implementing changes and opening a PR shortly.`,
                '',
                '| Step | Status |',
                '|------|--------|',
                '| Read codebase & plan | ⏳ |',
                '| Implement changes    | ⏳ |',
                '| Run build check      | ⏳ |',
                '| Create PR            | ⏳ |',
                '| Auto-merge (CI gate) | ⏳ |',
              ].join('\n'),
            });

      # ── 4. Pre-extract issue attachments (zip / images / HTML) ─────────────
      # Runs before the agent so every attachment is already on disk when the
      # agent's prompt is evaluated. The agent reads the manifest and skips curl/unzip.
      - name: Pre-extract issue attachments
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p /tmp/issue-attachments
          MANIFEST=/tmp/issue-attachments/manifest.txt

          # Extract attachment URLs from the issue body. Matches:
          #   - user-attachments (drag-drop in web UI)
          #   - release download assets (gh release upload)
          #   - raw.githubusercontent.com refs
          printf '%s' "$ISSUE_BODY" \
            | grep -oE 'https://github\.com/user-attachments/(files|assets)/[^ )"<>\n]+|https://github\.com/[^/]+/[^/]+/releases/download/[^ )"<>\n]+|https://raw\.githubusercontent\.com/[^ )"<>\n]+' \
            > /tmp/attachment-urls.txt || true

          if [ ! -s /tmp/attachment-urls.txt ]; then
            echo "none" > "$MANIFEST"
            echo "No attachments found in issue body."
          else
            echo "::group::Issue attachments"
            while IFS= read -r URL; do
              BASENAME=$(basename "$URL" | sed 's/[?#].*//')
              DEST="/tmp/issue-attachments/$BASENAME"
              echo "Downloading: $BASENAME"
              curl -fL --retry 2 -o "$DEST" "$URL" 2>/dev/null || { echo "WARN: failed to download $URL"; continue; }

              # Unzip into a subdirectory named after the stem
              if [[ "$BASENAME" == *.zip ]]; then
                STEM="${BASENAME%.zip}"
                mkdir -p "/tmp/issue-attachments/$STEM"
                unzip -o -q "$DEST" -d "/tmp/issue-attachments/$STEM/" || echo "WARN: unzip failed for $BASENAME"
                # Add extracted files to manifest
                find "/tmp/issue-attachments/$STEM" -type f \
                  | while read -r F; do
                      SIZE=$(stat -c%s "$F" 2>/dev/null || echo "?")
                      echo "zip-extracted  $SIZE  $F"
                    done >> "$MANIFEST"
              else
                # Classify by extension
                case "$BASENAME" in
                  *.png|*.jpg|*.jpeg|*.webp|*.svg) TYPE="image" ;;
                  *.html|*.htm) TYPE="html" ;;
                  *.pdf) TYPE="pdf" ;;
                  *) TYPE="other" ;;
                esac
                SIZE=$(stat -c%s "$DEST" 2>/dev/null || echo "?")
                echo "$TYPE  $SIZE  $DEST" >> "$MANIFEST"
              fi
            done < /tmp/attachment-urls.txt

            cat "$MANIFEST"
            echo "::endgroup::"
          fi

          echo "DESIGN_BUNDLE_DIR=/tmp/issue-attachments" >> "$GITHUB_ENV"

      # ── 5. Pre-install Claude Code (workaround: upstream installer regression)
      #         anthropics/claude-code-action#1290 — installer exits 0 without
      #         placing the binary when ~/.local/bin doesn't exist. Remove once
      #         Anthropic ships a fix and bumps the @v1 tag.
      - name: Pre-install Claude Code (workaround for upstream installer regression)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          if [ ! -x "$HOME/.local/bin/claude" ]; then
            echo "Installing Claude Code via official native installer..."
            curl -fsSL https://claude.ai/install.sh | bash
          fi
          if [ ! -x "$HOME/.local/bin/claude" ]; then
            echo "::error::Claude Code binary still missing after install.sh — upstream issue #1290 may have worsened. Consider pinning the action SHA until Anthropic ships a fix."
            exit 1
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/claude" --version

      # ── 5. Run Claude Code Agent (OAuth — no API key needed) ──────────────
      - name: Run Claude Code Agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.AGENT_PAT }}
          show_full_output: true
          claude_args: >-
            --model claude-sonnet-4-6
            --effort high
            --max-turns 100
            --permission-mode bypassPermissions
            --debug-file ${{ runner.temp }}/claude-debug.json

          prompt: |
            You are an autonomous Android coding agent triggered by GitHub Issue #${{ github.event.issue.number }}.

            ## Issue Details
            **Title:** ${{ github.event.issue.title }}
            **Label:** ${{ github.event.label.name }}
            **Type:** ${{ contains(github.event.label.name, 'fix') && 'Bug Fix' || 'Feature' }}

            **Description:**
            ${{ github.event.issue.body }}

            ## Available skills

            This repo ships 35 project-local skills at `.claude/skills/`. Auto-invoke them via
            the `Skill` tool whenever the issue matches. Key skills:

            - **`claude-design-to-android`** — use when the issue provides a design file, ZIP of
              screens, HTML mockup, or Figma export and asks to implement/replicate the UI in Compose.
              Invoke this FIRST before any other step when a design reference is attached.
            - **`android-ui-replicator`** — use when the issue includes a screenshot or design
              reference and asks to replicate / clone / rebuild / convert a screen into Kotlin + XML.
            - **`android-admob`** — use when the issue asks to add ads / monetize / integrate
              AdMob / banner / interstitial / app-open / rewarded ads, or mentions a
              `ca-app-pub-...` ID. The skill encodes the full Koin-DI wiring + Play Store
              policy guardrails — do not hand-roll AdMob code.
            - **`jetpack-compose`** — use for Compose UI patterns, animation, theming.
            - **`mvi-architecture`** — use when the issue involves state management or architecture changes.
            - **`navigation-compose`** — use when the issue touches navigation or deep linking.

            If a skill matches, invoke it BEFORE writing code — its workflow supersedes
            the generic "Implement" step below for that subtask.

            ## Issue attachments (PRE-EXTRACTED — read before coding)

            Before this step ran, the workflow downloaded every attachment URL from the
            issue body and extracted every zip. **Do NOT re-curl or re-unzip.**

            - **Manifest:** `/tmp/issue-attachments/manifest.txt` — read this FIRST.
              If it contains only `none`, there are no attachments; skip to the standard flow.
            - **Extracted zip contents:** `/tmp/issue-attachments/<zip-stem>/`
            - **Image attachments:** `/tmp/issue-attachments/*.{png,jpg,jpeg,webp,svg}`
            - **HTML mockups:** `/tmp/issue-attachments/*.html`

            If the manifest lists any design source file (`*.jsx`, `*.html`, `tokens.css`,
            `*.png`, `.design-canvas.state.json`), this is a **design-replication task** —
            read "Design-replication mode" below before posting your plan.

            ## Scope rules — STRICT (non-design issues only)

            - Only modify files needed to satisfy the issue's stated acceptance criteria.
            - **Never edit files under `.github/`, `gradle/`, `gradle.properties`, `settings.gradle*`, or top-level `build.gradle*`** unless the issue explicitly asks you to. Workflow and build configuration are off-limits.
            - Do not "improve" or "fix" unrelated code you happen to read along the way. If something looks wrong but is out of scope, mention it in the PR description instead of changing it.

            ## Design-replication mode (overrides STRICT scope)

            Activated when `/tmp/issue-attachments/manifest.txt` lists design source files
            (`*.jsx`, `*.html`, `tokens.css`, `*.png`, `.design-canvas.state.json`).

            **You MUST:**
            1. Add new files — at minimum update `Color.kt` / `Type.kt` with design tokens and
               create one Compose screen per `screens-*.jsx` source in the bundle.
               "Edit only existing files" is a **wrong** reading of a design-replication issue.
            2. Post a plan comment that **quotes concrete values from the design source** —
               at least 5 hex codes from `tokens.css`, the screen filenames you will replicate,
               and the drawable filenames you will import.
               Plans that say "no new Color parameters" or "no UiState change" while a design
               bundle is present are **AUTOMATICALLY INVALID** — rewrite the plan before editing.
            3. Read color values from `tokens.css` / `*.jsx` const declarations / inline
               `style={{ color: "#..." }}`. **Never hand-invent hex codes** when the bundle
               ships a palette.
            4. Copy referenced PNGs from the bundle into `app/src/main/res/drawable/`.
               Use the `extract_assets.py` script from the `claude-design-to-android` skill.

            **Plan template in design-replication mode** (replaces the standard template below):

            ```
            ## Implementation plan (pre-edit, design-replication)
            **Design sources I read:** <paths under /tmp/issue-attachments/, with concrete values:
              e.g. tokens.css → --bg=#0F172A, --primary=#4F46E5, screens-main.jsx → S01Home, S02Albums, …>
            **Theme files I will CREATE or UPDATE:** Color.kt, Type.kt, Shapes.kt
              — list every Color/TextStyle definition sourced verbatim from the design tokens.
            **Compose screens I will CREATE:** <one entry per screens-*.jsx in the bundle>
              — for each: the .jsx source file + target Kotlin path.
            **Drawable assets I will COPY from the bundle:** <source path → res/drawable target>
            **Existing screens I will UPDATE:** <list, or "none">
            **Tests:** <list, or "deferred — design replication">
            ```

            For **image-only** attachments (manifest has `*.png`/`*.jpg` but no zip):
            invoke the `android-ui-replicator` skill and pass the image paths from the manifest
            as the design reference before writing any code.

            The standard plan template and STRICT scope rules in "Instructions" below apply
            only to non-design issues.

            ## Instructions

            1. **Explore** the codebase — use `find`, `cat`, `Read`, `Grep` to understand the structure and patterns.

            2. **Plan — POST BEFORE EDITING.** Before any Edit/Write tool call, post a comment on issue #${{ github.event.issue.number }} with the following structure (use `gh issue comment ${{ github.event.issue.number }} --body "..."`):

               ```
               ## Implementation plan (pre-edit)
               **Files I will modify:** <full list with paths>
               **Every UI surface I will create or touch:** <enumerate every Box / Card / Surface / Row / Column that will receive a .background(...) — INCLUDE nested decorative surfaces: drag handles, pills, badges, dividers, chips, tab indicators. These are the surfaces that autofix loops keep missing.>
               **Every Color parameter I will thread:** <e.g. `color: Color` passed parent->child, `tint: Color` threaded through helpers — list every Color param crossing a composable boundary so the `color = color` violation pattern is caught before it compiles>
               **State-shape changes:** <UiState fields added/renamed/removed; downstream ViewModel + Test files that must update in the same PR>
               **Hardcoded glyphs / separators:** <none, OR: list with the strings.xml key each will become>
               **Tests I will add or update:** <full file list>
               ```

               The plan must be concrete — "Update UI" or "fix all violations" is not acceptable. If implementation reveals the plan was wrong, update the comment before continuing.

            3. **Read `CLAUDE.md`** at the repo root — it contains the mandatory architecture, accessibility, and security rules you MUST follow.

            4. **Implement** the ${{ contains(github.event.label.name, 'fix') && 'bug fix' || 'feature' }}:
               - Follow MVVM: ViewModel → UiState sealed class → stateless composables
               - Write unit tests for any new ViewModel or Repository logic
               - Add `contentDescription` to every Icon and Image
               - No `!!` operators

            5. **Verify** — run `./gradlew assembleDebug` and fix any compile errors. Then run `./gradlew test`.

            5a. **Self-critique against plan.** Run `git diff origin/main` and walk through every enumerated item in the plan comment:
               - Does the diff contain the change? If not, why?
               - Did your edits introduce any NEW Box/Card/Surface/Row/Column that was NOT in the enumeration? If yes, treat it as a plan miss — verify it is CLAUDE.md compliant, and update the plan comment.
               - Did any `color`/`tint` parameter appear in the diff that was not listed in the plan? Trace the parameter end-to-end and verify the value at every call site.
               Only proceed to step 5b once every diff item maps to a plan entry.

            5b. **Run the deterministic CLAUDE.md compliance linter** and fix every line it reports before opening the PR:
                ```
                bash scripts/check-claude-md.sh --diff origin/main
                ```
                **Do not push if this exits non-zero.** Common violations it catches:
                - `[A1]` `IconButton` touch target < 48 dp
                - `[S2]` single-char hardcoded separator like `Text(":")` — move to `strings.xml`
                - `[ARCH2]` `.collectAsState()` — must be `.collectAsStateWithLifecycle()`
                - `[SEC1]` cleartext `http://` URL — use HTTPS
                - `[SEC2]` hardcoded credential/API key — use environment variable or Android Keystore

            6. **Create a branch** named:
               `claude/${{ contains(github.event.label.name, 'fix') && 'fix' || 'feat' }}-issue-${{ github.event.issue.number }}-<short-description>`

            7. **Commit** all changes with message:
               `${{ contains(github.event.label.name, 'fix') && 'fix' || 'feat' }}: <description> (#${{ github.event.issue.number }})`

            8. **Open a PR** targeting `main` with:
               - Title matching the commit message
               - Body with: Summary, list of changed files, testing notes
               - Footer: `Closes #${{ github.event.issue.number }}`

            9. **Comment on the issue** with the PR link.

            10. **Enable auto-merge** on the PR you just opened:
               `gh pr merge <PR_URL_OR_NUMBER> --auto --squash --delete-branch`
               This queues the PR to merge automatically once all CI checks pass.

            If the scope is unclear, comment on the issue asking for clarification — do NOT create a PR with guesswork.

      # ── 5. Upload Claude debug log ────────────────────────────────────────────
      - name: Upload Claude debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-debug-agent-${{ github.event.issue.number }}-run${{ github.run_id }}
          path: ${{ runner.temp }}/claude-debug.json
          if-no-files-found: ignore
          retention-days: 14

      # ── 6. Deterministic CLAUDE.md compliance gate ───────────────────────────
      # Catches architecture/security/accessibility/separator violations that the
      # LLM may have missed. Fails the workflow before the PR is opened, so the
      # agent must address every match rather than pushing a violating branch.
      - name: Verify CLAUDE.md compliance (deterministic)
        if: success()
        run: |
          bash scripts/check-claude-md.sh --diff origin/main \
            || {
              echo "::error::Deterministic linter found BLOCKING violations in the agent's changes (A1, S2, ARCH1-2, SEC1-SEC10). Review the output above and fix all [BLOCKING] lines before opening a PR. [ADVISORY] lines (P1-P3, LC1-LC3, PRIV1-2) are informational only."
              exit 1
            }

      # ── 6. Add "implemented" label (fallback) ─────────────────────────────
      - name: Add implemented label
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.addLabels({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: ${{ github.event.issue.number }},
                labels:       ['claude: implemented'],
              });
            } catch (e) { console.log(e.message); }

      # ── 6. Post failure comment ───────────────────────────────────────────
      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: `## ❌ Claude Agent Failed\n\n[View the Actions log](${runUrl}) for details.\n\nTo retry: remove the label and re-add it.`,
            });
