name: 🤖 Claude Code Agent

on:
  issues:
    types: [labeled]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLAUDE_CODE_DEBUG_LOG_LEVEL: verbose

jobs:
  claude-agent:
    name: "🤖 Claude — ${{ github.event.label.name }}"
    if: |
      github.event.label.name == 'claude: fix' ||
      github.event.label.name == 'claude: implement'

    concurrency:
      group: claude-agent-issue-${{ github.event.issue.number }}
      cancel-in-progress: true

    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # ── 2. JDK (Phases 3 & 4 run gradlew) ───────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Grant Gradle permission
        run: chmod +x gradlew

      # ── 3. Signal start on issue ──────────────────────────────────────────
      - name: Post "agent activated" comment
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: [
                '## 🤖 Claude Code Agent Activated',
                '',
                `Analysing **Issue #${{ github.event.issue.number }}** — working through 5 phases.`,
                '',
                '| Phase | Status |',
                '|-------|--------|',
                '| 1 · Explore & Plan | ⏳ |',
                '| 2 · Implement      | ⏳ |',
                '| 3 · Build & Fix    | ⏳ |',
                '| 4 · Compliance     | ⏳ |',
                '| 5 · Open PR        | ⏳ |',
              ].join('\n'),
            });

      # ── 4. Pre-extract issue attachments ──────────────────────────────────
      - name: Pre-extract issue attachments
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p /tmp/issue-attachments
          MANIFEST=/tmp/issue-attachments/manifest.txt

          printf '%s' "$ISSUE_BODY" \
            | grep -oE 'https://github\.com/user-attachments/(files|assets)/[^ )"<>]+|https://github\.com/[^/]+/[^/]+/releases/download/[^ )"<>]+|https://raw\.githubusercontent\.com/[^ )"<>]+' \
            > /tmp/attachment-urls.txt || true

          if [ ! -s /tmp/attachment-urls.txt ]; then
            echo "none" > "$MANIFEST"
            echo "No attachments found in issue body."
          else
            echo "::group::Issue attachments"
            : > "$MANIFEST"
            while IFS= read -r URL; do
              BASENAME=$(basename "$URL" | sed 's/[?#].*//')
              DEST="/tmp/issue-attachments/$BASENAME"
              echo "Downloading: $BASENAME"
              curl -fL --retry 2 -o "$DEST" "$URL" 2>/dev/null || { echo "WARN: failed to download $URL"; continue; }

              if [[ "$BASENAME" == *.zip ]]; then
                STEM="${BASENAME%.zip}"
                mkdir -p "/tmp/issue-attachments/$STEM"
                unzip -o -q "$DEST" -d "/tmp/issue-attachments/$STEM/" || echo "WARN: unzip failed for $BASENAME"
                find "/tmp/issue-attachments/$STEM" -type f \
                  | while read -r F; do
                      SIZE=$(stat -c%s "$F" 2>/dev/null || echo "?")
                      echo "zip-extracted  $SIZE  $F"
                    done >> "$MANIFEST"
              else
                case "$BASENAME" in
                  *.png|*.jpg|*.jpeg|*.webp|*.svg) TYPE="image" ;;
                  *.html|*.htm) TYPE="html" ;;
                  *.pdf) TYPE="pdf" ;;
                  *) TYPE="other" ;;
                esac
                SIZE=$(stat -c%s "$DEST" 2>/dev/null || echo "?")
                echo "$TYPE  $SIZE  $DEST" >> "$MANIFEST"
              fi
            done < /tmp/attachment-urls.txt

            cat "$MANIFEST"
            echo "::endgroup::"
          fi

          echo "DESIGN_BUNDLE_DIR=/tmp/issue-attachments" >> "$GITHUB_ENV"

      # ── 5. Pre-install Claude Code ────────────────────────────────────────
      - name: Pre-install Claude Code (workaround for upstream installer regression)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          if [ ! -x "$HOME/.local/bin/claude" ]; then
            echo "Installing Claude Code via official native installer..."
            curl -fsSL https://claude.ai/install.sh | bash
          fi
          if [ ! -x "$HOME/.local/bin/claude" ]; then
            echo "::error::Claude Code binary still missing after install.sh — upstream issue #1290 may have worsened. Consider pinning the action SHA until Anthropic ships a fix."
            exit 1
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/claude" --version

      # ═══════════════════════════════════════════════════════════════════════
      # PHASE 1 — EXPLORE & PLAN
      # Read-only. Outputs /tmp/phase1-plan.txt and posts plan as issue comment.
      # ═══════════════════════════════════════════════════════════════════════
      - name: "🔍 Phase 1 — Explore & Plan"
        uses: ./.github/actions/claude-with-retry
        with:
          oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.AGENT_PAT }}
          show_full_output: true
          claude_args: >-
            --model claude-opus-4-7
            --effort high
            --max-turns 100
            --permission-mode bypassPermissions
            --allowedTools "Bash Read Grep Glob"
            --debug-file ${{ runner.temp }}/claude-debug-p1.json

          prompt: |
            You are in **EXPLORE & PLAN** mode for Issue #${{ github.event.issue.number }}.
            **DO NOT edit or create any source files. Read and plan only.**

            ## Issue Details
            **Title:** ${{ github.event.issue.title }}
            **Label:** ${{ github.event.label.name }}
            **Type:** ${{ contains(github.event.label.name, 'fix') && 'Bug Fix' || 'Feature' }}

            **Description:**
            ${{ github.event.issue.body }}

            ## Attachments (pre-extracted — do NOT re-curl or re-unzip)
            Read `/tmp/issue-attachments/manifest.txt` first.
            If it contains only `none`, there are no attachments.

            ## Available skills (invoke via Skill tool if available in this environment)
            - `claude-design-to-android` — design zip / HTML bundle → Compose screens
            - `android-ui-replicator` — screenshot/image → Kotlin + Compose
            - `android-admob` — AdMob / ads / ca-app-pub- IDs
            - `jetpack-compose` — Compose UI patterns and animation
            - `mvi-architecture` — state management and UiState design
            - `navigation-compose` — navigation graph changes

            If a skill matches this issue, invoke it now **in planning mode only** — use it to determine the approach, not to write code. Phase 2 does the implementation.

            ## Steps

            1. **Read `CLAUDE.md`** at the repo root.

            2. **Explore the codebase** — use Read, Grep, Glob, Bash to understand the relevant files, patterns, and conventions. Read 2–3 sibling screens before designing new UI.

            3. **Read design files if present.** If the manifest lists design sources (`*.jsx`, `*.html`, `tokens.css`, `*.png`):
               - Read them and extract concrete values: hex colours, screen names, asset filenames.
               - Never invent hex codes — use only values found in the design source.

            4. **Write a structured plan** to `/tmp/phase1-plan.txt` in EXACTLY this format (keep field names verbatim, one item per line under each field, write `NONE` if empty):

            ```
            ISSUE_TYPE: fix|feature|design-replication
            AFFECTED_FILES:
            - <full path>
            NEW_FILES:
            - NONE
            UI_SURFACES:
            - NONE
            COLOR_PARAMS:
            - NONE
            STATE_CHANGES:
            - NONE
            HARDCODED_GLYPHS:
            - NONE
            TEST_FILES:
            - NONE
            IMPLEMENTATION_NOTES:
            <free text — approach, key patterns, gotchas>
            ```

            For `design-replication` ISSUE_TYPE, add these fields after IMPLEMENTATION_NOTES:
            ```
            DESIGN_TOKENS:
            - <name>: <hex or value verbatim from source>
            SCREENS:
            - <screens-*.jsx source> → <target Kotlin path>
            DRAWABLE_ASSETS:
            - <source path> → <res/drawable/target.png>
            ```

            5. **Post the plan as an issue comment** — Phase 2 starts automatically after:
               ```
               gh issue comment ${{ github.event.issue.number }} --body "## 📋 Implementation Plan

            $(cat /tmp/phase1-plan.txt)

            ---
            _Phase 2 (implementation) starting automatically._"
               ```

            ## Scope rules
            - Only plan files needed to satisfy the issue's stated acceptance criteria.
            - Never plan edits to `.github/`, `gradle/`, `gradle.properties`, `settings.gradle*`, or top-level `build.gradle*`.
            - Do NOT create branches, commits, or PRs. Phase 5 handles that.
            - Do NOT run `./gradlew`. Phase 3 handles that.

      # ── Validate plan & export state to subsequent phases ─────────────────
      - name: Validate plan & export to env
        run: |
          if [ ! -f /tmp/phase1-plan.txt ]; then
            echo "::error::Phase 1 did not produce /tmp/phase1-plan.txt — aborting."
            exit 1
          fi

          echo "=== Phase 1 plan ==="
          cat /tmp/phase1-plan.txt
          echo "===================="

          for FIELD in ISSUE_TYPE AFFECTED_FILES IMPLEMENTATION_NOTES; do
            if ! grep -q "^${FIELD}:" /tmp/phase1-plan.txt; then
              echo "::error::Plan is missing required field: ${FIELD}"
              exit 1
            fi
          done

          # Export plan for Phase 2 (multiline-safe heredoc pattern)
          {
            echo 'PLAN_CONTENT<<PLAN_EOF'
            cat /tmp/phase1-plan.txt
            echo 'PLAN_EOF'
          } >> "$GITHUB_ENV"

          # Export ISSUE_TYPE for Phase 5 branch naming
          ISSUE_TYPE=$(grep '^ISSUE_TYPE:' /tmp/phase1-plan.txt | awk '{print $2}' | tr -d '[:space:]')
          echo "ISSUE_TYPE=${ISSUE_TYPE}" >> "$GITHUB_ENV"

          echo "✅ Plan validated — ISSUE_TYPE=${ISSUE_TYPE}"

      # ═══════════════════════════════════════════════════════════════════════
      # PHASE 2 — IMPLEMENT
      # Full edit access. Executes the plan only.
      # Does NOT run gradlew, does NOT create branches or commits.
      # ═══════════════════════════════════════════════════════════════════════
      - name: "⚙️ Phase 2 — Implement"
        uses: ./.github/actions/claude-with-retry
        with:
          oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.AGENT_PAT }}
          show_full_output: true
          claude_args: >-
            --model claude-sonnet-4-6
            --effort high
            --max-turns 100
            --permission-mode bypassPermissions
            --allowedTools "Bash Read Edit Write Grep Glob"
            --debug-file ${{ runner.temp }}/claude-debug-p2.json

          prompt: |
            You are in **IMPLEMENT** mode for Issue #${{ github.event.issue.number }}.

            ## Plan from Phase 1
            ${{ env.PLAN_CONTENT }}

            ## Issue Details
            **Title:** ${{ github.event.issue.title }}
            **Label:** ${{ github.event.label.name }}

            **Description:**
            ${{ github.event.issue.body }}

            ## Attachments (pre-extracted — do NOT re-curl or re-unzip)
            Manifest: `/tmp/issue-attachments/manifest.txt`

            ## Available skills (invoke via Skill tool if available in this environment)
            - `claude-design-to-android` — design zip / HTML bundle → Compose
            - `android-ui-replicator` — image-only attachments → Kotlin + Compose
            - `android-admob` — AdMob / ads / ca-app-pub- IDs
            - `jetpack-compose` — Compose UI patterns
            - `mvi-architecture` — state management
            - `navigation-compose` — navigation changes

            If a skill matches, invoke it **BEFORE writing code** — its workflow supersedes generic implementation for that subtask.

            ## Implementation rules

            1. **Read `CLAUDE.md`** at the repo root before writing any code.
            2. Implement **only** the files listed in `AFFECTED_FILES` and `NEW_FILES` from the plan above.
            3. **Never edit** `.github/`, `gradle/`, `gradle.properties`, `settings.gradle*`, or top-level `build.gradle*`.
            4. Follow MVVM — ViewModel exposes `StateFlow<UiState>`, screens collect with `collectAsStateWithLifecycle()`.
            5. Add `contentDescription` to every `Icon` and `Image`.
            6. No `!!` operators on values from external input, network, or user interaction.
            7. User-visible UI strings (labels, buttons, error messages) → `strings.xml`. Internal constants and log tags → inline.
            8. Wrap expensive calculations in `remember { }`. Supply `key =` to `items()` in `LazyColumn`/`LazyRow`.

            ## Design-replication (when ISSUE_TYPE is `design-replication`)
            - Read colour values from `DESIGN_TOKENS` in the plan — use verbatim, never invent hex codes.
            - Create one Compose screen per entry in `SCREENS`.
            - Copy drawable assets per `DRAWABLE_ASSETS` using the `extract_assets.py` script if available from the `claude-design-to-android` skill.

            ## Constraints
            - Do **NOT** run `./gradlew`. Phase 3 verifies the build.
            - Do **NOT** create branches, commits, or PRs. Phase 5 handles Git.

      # ═══════════════════════════════════════════════════════════════════════
      # PHASE 3 — BUILD VERIFY + AUTO-FIX LOOP
      # Mirrors android-ci.yml exactly: assembleDebug --stacktrace, test, lint.
      # Claude reads /tmp/build.log directly via its Read tool.
      # Up to 3 fix attempts before failing with an issue comment.
      # ═══════════════════════════════════════════════════════════════════════
      - name: "🔨 Phase 3 — Build verify & auto-fix"
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
        run: |
          set -euo pipefail
          MAX_ATTEMPTS=3

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "::group::Build attempt $attempt / $MAX_ATTEMPTS"
            set +e
            ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log
            BUILD_EXIT=${PIPESTATUS[0]}
            if [ $BUILD_EXIT -eq 0 ]; then
              ./gradlew test --no-daemon 2>&1 | tee -a /tmp/build.log
              TEST_EXIT=${PIPESTATUS[0]}
            else
              TEST_EXIT=1
            fi
            if [ $TEST_EXIT -eq 0 ]; then
              ./gradlew lint --no-daemon 2>&1 | tee -a /tmp/build.log
              LINT_EXIT=${PIPESTATUS[0]}
            else
              LINT_EXIT=1
            fi
            set -e
            echo "::endgroup::"

            if [ $BUILD_EXIT -eq 0 ] && [ $TEST_EXIT -eq 0 ] && [ $LINT_EXIT -eq 0 ]; then
              echo "✅ Build, tests, and lint all passed on attempt $attempt"
              exit 0
            fi

            if [ "$attempt" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Build/tests/lint still failing after $MAX_ATTEMPTS fix attempts"
              FAIL_SNIPPET=$(tail -80 /tmp/build.log | sed "s/\`/'/g")
              gh issue comment ${{ github.event.issue.number }} \
                --body "## ⚠️ Phase 3 Failed — Build could not be fixed in $MAX_ATTEMPTS attempts

          Claude tried $MAX_ATTEMPTS times to fix the build/tests/lint but was unable to. Manual intervention required.

          **Last build log (tail 80 lines):**
          \`\`\`
          ${FAIL_SNIPPET}
          \`\`\`

          [View full Actions log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
              exit 1
            fi

            echo "Build/test/lint failed on attempt $attempt — invoking Claude fix..."

            claude \
              --model claude-sonnet-4-6 \
              --allowedTools "Read Edit Write Bash Grep Glob" \
              --max-turns 100 \
              --permission-mode bypassPermissions \
              -p "Fix the build, test, or lint failures in the Android project.

            Read /tmp/build.log to see what failed (the full output is in that file).

            Rules:
            - Only edit source files under app/src/. Do NOT edit .github/, gradle/, gradle.properties, settings.gradle*, or top-level build.gradle*.
            - Do NOT suppress lint rules or add @Suppress / lintOptions disable entries — fix the underlying code.
            - Do NOT add @Ignore or comment out failing tests — fix the test or fix the production code.
            - Do NOT run gradlew — the CI loop will verify after you finish.

            Fix attempt $attempt of $MAX_ATTEMPTS."
          done

      # ═══════════════════════════════════════════════════════════════════════
      # PHASE 4 — COMPLIANCE CHECK + AUTO-FIX LOOP
      # Runs check-claude-md.sh. Feeds only [BLOCKING] lines to Claude.
      # After each fix, re-runs all 3 gradle commands to catch regressions.
      # Up to 2 fix attempts before failing.
      # ═══════════════════════════════════════════════════════════════════════
      - name: "🔍 Phase 4 — Compliance check & fix"
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
        run: |
          set -euo pipefail
          MAX_ATTEMPTS=2

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "::group::Compliance check attempt $attempt / $MAX_ATTEMPTS"
            set +e
            bash scripts/check-claude-md.sh --diff origin/main > /tmp/lint.log 2>&1
            LINT_EXIT=$?
            set -e
            cat /tmp/lint.log
            echo "::endgroup::"

            if [ $LINT_EXIT -eq 0 ]; then
              echo "✅ Compliance passed on attempt $attempt"
              exit 0
            fi

            if [ "$attempt" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::BLOCKING compliance violations remain after $MAX_ATTEMPTS fix attempts"
              exit 1
            fi

            echo "Compliance violations found on attempt $attempt — invoking Claude fix..."

            # Write blocking-only lines to a separate file so Claude gets a focused view
            grep '\[BLOCKING\]' /tmp/lint.log > /tmp/blocking.log || echo "(no BLOCKING lines found by grep — check full lint.log)" > /tmp/blocking.log

            claude \
              --model claude-sonnet-4-6 \
              --allowedTools "Read Edit Write Grep Glob Bash" \
              --max-turns 100 \
              --permission-mode bypassPermissions \
              -p "Fix ONLY the [BLOCKING] CLAUDE.md violations.

            Read /tmp/blocking.log for the list of blocking violations.
            Read /tmp/lint.log for the full compliance output if you need more context.

            Rules:
            - Fix ALL [BLOCKING] violations by doing a rule-class sweep: for each violation type (e.g. SEC1 cleartext URL, ARCH2 collectAsState, A1 touch target), grep ALL files changed in this PR diff for every other instance of the same rule class and fix them all — not just the flagged lines.
            - Do NOT fix [ADVISORY] violations in this pass.
            - Do NOT edit .github/, gradle/, gradle.properties, settings.gradle*, or top-level build.gradle*.
            - Do NOT suppress the rule (no @Suppress, no lint disable comments, no abortOnError = false) — fix the underlying code.
            - Do NOT run gradlew — the loop will re-verify after you finish.

            Fix attempt $attempt of $MAX_ATTEMPTS."

            # Re-verify build after compliance fix to catch any regressions introduced
            echo "::group::Re-verify build after compliance fix"
            set +e
            ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build-recheck.log
            B=${PIPESTATUS[0]}
            ./gradlew test --no-daemon 2>&1 | tee -a /tmp/build-recheck.log
            T=${PIPESTATUS[0]}
            ./gradlew lint --no-daemon 2>&1 | tee -a /tmp/build-recheck.log
            L=${PIPESTATUS[0]}
            set -e
            echo "::endgroup::"

            if [ $B -ne 0 ] || [ $T -ne 0 ] || [ $L -ne 0 ]; then
              echo "::error::Compliance fix introduced a build/test/lint regression — failing Phase 4"
              exit 1
            fi
          done

      # ── Configure git identity before Phase 5 ────────────────────────────
      - name: Configure git identity
        run: |
          git config user.name  "claude-agent[bot]"
          git config user.email "claude-agent@users.noreply.github.com"

      # ═══════════════════════════════════════════════════════════════════════
      # PHASE 5 — BRANCH + PR
      # Bash-only. Creates branch, commits, pushes, opens PR, enables auto-merge.
      # ═══════════════════════════════════════════════════════════════════════
      - name: "🚀 Phase 5 — Create branch & open PR"
        uses: ./.github/actions/claude-with-retry
        with:
          oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.AGENT_PAT }}
          show_full_output: true
          claude_args: >-
            --model claude-sonnet-4-6
            --effort high
            --max-turns 100
            --permission-mode bypassPermissions
            --allowedTools "Bash"
            --debug-file ${{ runner.temp }}/claude-debug-p5.json

          prompt: |
            You are in **BRANCH & PR** mode for Issue #${{ github.event.issue.number }}.
            Only use Bash (git and gh commands). Do NOT read or edit source files — the code is already written.

            ## Context
            Issue title: ${{ github.event.issue.title }}
            ISSUE_TYPE: ${{ env.ISSUE_TYPE }}

            ## Steps

            1. **Create branch:**
               - If ISSUE_TYPE is `fix`: `git checkout -b claude/fix-issue-${{ github.event.issue.number }}-<3-word-slug>`
               - Otherwise: `git checkout -b claude/feat-issue-${{ github.event.issue.number }}-<3-word-slug>`
               - The slug must be kebab-case, derived from the issue title.

            2. **Commit all changes:**
               ```
               git add -A
               git commit -m "<fix|feat>: ${{ github.event.issue.title }} (#${{ github.event.issue.number }})"
               ```
               Use `fix:` if ISSUE_TYPE is `fix`, otherwise `feat:`.

            3. **Push:**
               ```
               git push -u origin HEAD
               ```

            4. **Open PR** targeting `main`:
               ```
               gh pr create \
                 --title "<fix|feat>: ${{ github.event.issue.title }} (#${{ github.event.issue.number }})" \
                 --body "..."
               ```
               PR body must include:
               - `## Summary` — 2–3 bullet points describing what changed
               - `## Changed files` — list of modified/created files
               - `## Testing notes` — how to verify the change manually
               - Footer: `Closes #${{ github.event.issue.number }}`

            5. **Enable auto-merge** (so it merges once all CI checks pass):
               ```
               gh pr merge <PR_NUMBER> --auto --squash --delete-branch
               ```

            6. **Comment on the issue** with the PR link:
               ```
               gh issue comment ${{ github.event.issue.number }} --body "🚀 PR opened: <PR_URL>"
               ```

      # ── Upload Claude debug logs (all phases) ────────────────────────────
      - name: Upload Claude debug logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: claude-debug-agent-${{ github.event.issue.number }}-run${{ github.run_id }}
          path: ${{ runner.temp }}/claude-debug-p*.json
          if-no-files-found: ignore
          retention-days: 14

      # ── Final deterministic compliance gate ──────────────────────────────
      - name: Verify CLAUDE.md compliance (final gate)
        if: success()
        run: |
          bash scripts/check-claude-md.sh --diff origin/main \
            || {
              echo "::error::Deterministic linter found BLOCKING violations after all phases (A1, S2, ARCH1-2, SEC1-SEC10). Review the output above and fix manually. [ADVISORY] lines (P1-P3, LC1-LC3, PRIV1-2) are informational only."
              exit 1
            }

      # ── Add "implemented" label ───────────────────────────────────────────
      - name: Add implemented label
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            try {
              await github.rest.issues.addLabels({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: ${{ github.event.issue.number }},
                labels:       ['claude: implemented'],
              });
            } catch (e) { console.log(e.message); }

      # ── Post failure comment ──────────────────────────────────────────────
      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: `## ❌ Claude Agent Failed\n\n[View the Actions log](${runUrl}) for details.\n\nTo retry: remove the label and re-add it.`,
            });
